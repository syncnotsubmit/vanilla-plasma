name: Vanilla Plasma Desktop # Replace this name with your image name
id: vanilla-plasma # Replace this ID with your image ID
vibversion: 1.0.7

stages:
- id: build
  base: ghcr.io/vanilla-os/core:dev # Optionally, Replace this image URL with a different one i.e. nvidia:main, etc
  addincludes: true
  singlelayer: false
  labels:
    maintainer: self-maintained # Optionally, Replace this with your name
  args:
    DEBIAN_FRONTEND: noninteractive # Set the image environment as non-interactive

  # Commands to run first before building the modules
  runs:
    commands:
      - echo 'APT::Install-Recommends "1";' > /etc/apt/apt.conf.d/01norecommends

  modules:
  - name: init-setup
    type: shell
    commands:
    - echo 'PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games"' > /etc/environment
    - sed -i '4,10d' /etc/profile
    - apt-get update
    - apt-get clean
    - apt-get install -y squashfs-tools minisign
    - mkdir -p /usr/bin
    - curl -L https://github.com/Vanilla-OS/vanilla-tools/releases/download/v1.0.1/vanilla-tools-amd64.tar.gz | tar -xz -C /usr/bin
    - chmod +x /usr/bin/lpkg
    - lpkg --unlock

  # Put your custom actions below this comment

  - name: network-manager-setup
    type: shell
    commands:
    - apt-get install -y network-manager network-manager-openvpn
    - cp /etc/network/interfaces /etc/network/interfaces.backup
    - echo '# Network Manager is now handling network interfaces' > /etc/network/interfaces
    - systemctl enable NetworkManager

  - name: plasma-desktop-install
    type: apt
    sources:
      - packages:
        - kde-plasma-desktop
        - qt6-svg-plugins
        - desktop-file-utils

  - name: plasma-cleanup
    type: shell
    commands:
    - apt-get purge -y konqueror* zutty*
    - apt-get autopurge -y
    - update-desktop-database

  - name: vanilla-modules
    type: includes
    includes:
      - modules/00-vanilla-desktop-base.yml
      - modules/00-vanilla-backgrounds.yml
      - modules/00-vanilla-first-setup.yml
      - modules/00-vanilla-system-operator.yml
      - modules/00-vanilla-apx-wrapper.yml
      - modules/00-vanilla-tour.yml
      - modules/00-vanilla-sideload.yml
      - modules/00-vanilla-updates-utility.yml
      - modules/00-vanilla-prime-utility.yml
      - modules/03-fswarn.yml
      - modules/10-vanilla-abroot-rollback-notifier.yml
      - modules/18-libs-extra.yml
      - modules/121-disable-ssh-daemon.yml
      - modules/130-plymouth.yml
      - modules/131-plymouth-theme-vanilla.yml
      - modules/140-password.yml
      - modules/160-utilities.yml
      - modules/997-misc-setup.yml
      - modules/999-cleanup.yml

  # Put your custom actions above this comment

  - name: set-image-name-abroot
    type: includes
    includes:
      - modules/80-set-image-abroot-config.yml

  - name: cleanup
    type: shell
    commands:
    - apt-get autoremove -y
    - apt-get clean
    - lpkg --lock
    - rsync -a /etc/ /sysconf/

  - name: fsguard
    type: fsguard
    CustomFsGuard: false
    FsGuardLocation: "/usr/sbin/FsGuard"
    GenerateKey: true
    FilelistPaths: ["/usr/bin"]
    modules:
      - name: remove-prev-fsguard
        type: shell
        commands:
          - rm -rf /FsGuard
          - rm -f ./minisign.pub ./minisign.key
          - chmod +x /usr/share/init.d/010-fsguard.sh

  - name: cleanup2
    type: shell
    commands:
      - rm -rf /tmp/*
      - rm -rf /var/tmp/*
